<style>
    body {
        margin: 0;
        background: #0f0f0f;
        font-family: Inter, Arial, sans-serif;
        color: #fff;
    }

    a { text-decoration: none; }

    .back-home {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #bdbdbd;
        font-size: 15px;
    }

    .container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    /* HEXAGON */
    .logo {
        width: 120px;
        height: 120px;
        background: #b300ff;
        clip-path: polygon(
            25% 0%, 75% 0%,
            100% 50%,
            75% 100%, 25% 100%,
            0% 50%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 35px;
    }

    .logo span {
        color: #ffffff;
        font-size: 58px;
        font-weight: 800;
        letter-spacing: -1px;
    }

    .card {
        width: 100%;
        max-width: 420px;
        background: #1a1a1a;
        padding: 45px;
        border-radius: 14px;
        box-shadow: 0px 0px 60px rgba(0,0,0,0.55);
        text-align: left;
    }

    .card h2 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
    }

    .card p {
        margin: 12px 0 32px;
        color: #bdbdbd;
        font-size: 16px;
    }

    .input-group {
        margin-bottom: 26px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 15px;
        color: #d0d0d0;
        font-weight: 500;
    }

    .input-group input {
        width: 100%;
        padding: 15px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        color: #ffffff;
        font-size: 15px;
        outline: none;
    }

    .input-group input:focus {
        border-color: #b300ff;
    }

    .forgot {
        display: block;
        text-align: right;
        margin-top: -6px;
        margin-bottom: 28px;
        color: #b300ff;
        font-size: 15px;
        cursor: pointer;
    }

    .login-btn {
        width: 100%;
        padding: 16px;
        background: #b300ff;
        border: none;
        border-radius: 6px;
        color: #ffffff;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
    }

    .register {
        margin-top: 28px;
        text-align: center;
        color: #bdbdbd;
        font-size: 15px;
    }

    .register a {
        color: #b300ff;
        font-weight: 500;
        cursor: pointer;
    }

    /* ⭐ RESPONSIVE FIXES ⭐ */
    @media (max-width: 480px) {
        .logo {
            width: 90px;
            height: 90px;
        }

        .logo span {
            font-size: 42px;
        }

        .card {
            padding: 30px;
        }

        .card h2 {
            font-size: 24px;
        }

        .card p {
            font-size: 14px;
        }

        .input-group input {
            padding: 13px;
            font-size: 14px;
        }

        .login-btn {
            padding: 14px;
            font-size: 16px;
        }
    }
</style>
