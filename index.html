<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Minemen Club</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #060606;
        font-family: Inter, Arial, sans-serif;
        color: #fff;
        overflow-x: hidden;
    }

    a { text-decoration: none; }

    .back-home {
        position: absolute;
        top: 22px;
        left: 22px;
        color: #bdbdbd;
        font-size: 15px;
    }

    .container {
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        box-sizing: border-box;
    }

    /* ⭐ ROTATED LOGO + NO OUTLINE */
    .logo {
        width: 42px;
        height: 42px;
        background: #e911e5;
        border: none; /* outline removed */
        border-radius: 4px;

        transform: rotate(90deg); /* rotate shape */

        clip-path: polygon(
            25% 0%, 75% 0%,
            100% 50%,
            75% 100%, 25% 100%,
            0% 50%
        );

        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto;
    }

    /* ⭐ Keep the M upright */
    .logo span {
        color: #ffffff;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -1px;
        transform: rotate(-90deg);
    }

    /* ⭐ DARKER CARD + THIN OUTLINE */
    .card {
        width: 100%;
        max-width: 420px;
        background: rgba(12, 12, 12, 0.92);
        padding: 55px 48px;
        border-radius: 14px;

        border: 1px solid #1a1a1a;

        box-shadow: 0px 0px 45px rgba(0,0,0,0.55);
        text-align: left;
        box-sizing: border-box;
    }

    .card h2 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
    }

    .card p {
        margin: 12px 0 28px;
        color: #bdbdbd;
        font-size: 16px;
    }

    .input-group {
        margin-bottom: 22px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 15px;
        color: #d0d0d0;
        font-weight: 500;
    }

    .input-group input {
        width: 100%;
        padding: 15px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        color: #ffffff;
        font-size: 15px;
        outline: none;
        box-sizing: border-box;
    }

    .input-group input:focus {
        border-color: #d946ef;
    }

    .forgot {
        display: block;
        text-align: right;
        margin-top: -2px;
        margin-bottom: 26px;
        color: #d946ef;
        font-size: 15px;
    }

    .login-btn {
        width: 100%;
        padding: 16px;
        background: #d946ef;
        border: none;
        border-radius: 6px;
        color: #ffffff;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        box-sizing: border-box;
    }

    .register {
        margin-top: 26px;
        text-align: center;
        color: #d946ef;
        font-size: 15px;
    }

    .register a {
        color: #d946ef;
        font-weight: 500;
    }

    @media (max-width: 480px) {
        .logo {
            width: 64px;
            height: 64px;
        }

        .logo span {
            font-size: 30px;
        }

        .card {
            padding: 35px;
        }
    }
</style>
</head>

<body>

<a class="back-home" href="https://minemen.club/">← Back to Home</a>

<div class="container">

    <div class="card">

        <div class="logo">
            <span>M</span>
        </div>

        <h2>Welcome back</h2>
        <p>Log in to your Minemen Club account</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <a class="forgot" href="https://minemen.club/login/reset-pass">Forgot your password?</a>

            <button class="login-btn">Log In</button>

            <div class="register">
                Don’t have an account? <a href="https://minemen.club/register">Register here</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const email = formData.get("email");
    const password = formData.get("password");

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
    });

    const text = await res.text();
    alert(text);
});
</script>

</body>
</html>
