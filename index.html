<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Minemen Club</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #0f0f0f;
        font-family: Inter, Arial, sans-serif;
        color: #fff;
    }

    a { text-decoration: none; }

    .back-home {
        position: absolute;
        top: 28px;
        left: 28px;
        color: #bdbdbd;
        font-size: 15px;
    }

    .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .logo {
        width: 120px;
        height: 120px;
        background: #b300ff;
        clip-path: polygon(
            25% 0%, 75% 0%,
            100% 50%,
            75% 100%, 25% 100%,
            0% 50%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 35px;
    }

    .logo span {
        color: #ffffff;
        font-size: 58px;
        font-weight: 800;
        letter-spacing: -1px;
    }

    .card {
        width: 420px;
        background: #1a1a1a;
        padding: 45px;
        border-radius: 14px;
        box-shadow: 0px 0px 60px rgba(0,0,0,0.55);
        text-align: left;
    }

    .card h2 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
    }

    .card p {
        margin: 12px 0 32px;
        color: #bdbdbd;
        font-size: 16px;
    }

    .input-group {
        margin-bottom: 26px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 15px;
        color: #d0d0d0;
        font-weight: 500;
    }

    .input-group input {
        width: 100%;
        padding: 15px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        color: #ffffff;
        font-size: 15px;
        outline: none;
    }

    .input-group input:focus {
        border-color: #b300ff;
    }

    .forgot {
        display: block;
        text-align: right;
        margin-top: -6px;
        margin-bottom: 28px;
        color: #b300ff;
        font-size: 15px;
        cursor: pointer;
    }

    .login-btn {
        width: 100%;
        padding: 16px;
        background: #b300ff;
        border: none;
        border-radius: 6px;
        color: #ffffff;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
    }

    .register {
        margin-top: 28px;
        text-align: center;
        color: #bdbdbd;
        font-size: 15px;
    }

    .register a {
        color: #b300ff;
        font-weight: 500;
        cursor: pointer;
    }
</style>
</head>

<body>

<a class="back-home" href="https://minemen.club/">← Back to Home</a>

<div class="container">

    <div class="logo">
        <span>M</span>
    </div>

    <div class="card">
        <h2>Welcome back</h2>
        <p>Log in to your Minemen Club account</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <a class="forgot" href="https://minemen.club/login/reset-pass">Forgot your password?</a>

            <button class="login-btn">Log In</button>

            <div class="register">
                Don’t have an account? <a href="https://minemen.club/register">Register here</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const email = formData.get("email");
    const password = formData.get("password");

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
    });

    const text = await res.text();
    alert(text);
});
</script>

</body>
</html>
